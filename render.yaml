services:
  - type: web
    name: inventory-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"

  - type: pgsql
    name: inventory-db
    plan: free
    databaseName: inventory_db
